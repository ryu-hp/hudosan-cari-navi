  <!-- Header（例: ロゴとナビゲーション） -->
  <header class="lpHeader">
    <div class="lpHeader__container">
      <div class="lpHeader__logo">
        <a href="/">
          <img src="/wp-content/uploads/2026/03/logo.webp" alt="みつたけ探偵事務所">
        </a>  
      </div>
      <div class="lpHeader__btn-contents">
        <div class="lpHeader__btn">

        <li class="lpHeader__drower-menu-item">

      <div class="lpHeader__drower-btn-contents">

          <a href="#contact" class="mitsutake-btn mitsutake-btn--brown" data-inquiry-type="お問い合わせ">

      <!-- セクションタイトルは共通化できる場合はできるだけ共通化します。 -->

        <h2 class="section-title__text">こんなお悩みは<br class="br-sp">ありませんか？</h2>
